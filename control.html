<style>
body{font-family:Arial;padding:30px}
input{width:100%;padding:10px;margin-bottom:10px;font-size:16px}
button{padding:10px 15px;border:none;border-radius:8px;cursor:pointer}
.add{background:#4CAF50;color:#fff}
.spin{background:#ff3d7f;color:#fff;font-size:18px;margin-top:15px}
.clear{background:#333;color:#fff;margin-left:10px}
.item{
  background:#ffe4ef;
  padding:8px 12px;
  margin:6px 0;
  border-radius:6px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.delete{
  background:#ff4d6d;
  color:white;
  padding:4px 8px;
  border-radius:6px;
  font-size:12px;
}
.preset{
  background:#2196F3;
  color:#fff;
  padding:8px 12px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-size:14px;
}
</style>

<body>

<h1>🎰 Control de Ruleta</h1>

<label>Texto del item</label>
<input id="texto" placeholder="Ej: 5 Gifted Subs">

<button class="add" onclick="agregar()">➕ Agregar</button>

<h3>🚫 Excluir items del sorteo:</h3>
<div style="margin-bottom:10px">
  <label>Item 1 a excluir:</label>
  <select id="excluir1" style="width:100%;padding:10px;font-size:16px;margin-bottom:5px;border-radius:8px;">
    <option value="">-- Ninguno --</option>
  </select>
  
  <label>Item 2 a excluir:</label>
  <select id="excluir2" style="width:100%;padding:10px;font-size:16px;margin-bottom:10px;border-radius:8px;">
    <option value="">-- Ninguno --</option>
  </select>
</div>
<button class="spin" onclick="girarConExclusiones()">🎲 GIRAR CON EXCLUSIONES</button>

<h3>Listas predefinidas:</h3>
<div style="margin:15px 0;display:flex;gap:10px;flex-wrap:wrap">

  <button class="preset" onclick="cargarKillersLicenciados()">🎬 Killers Licenciados</button>
  <button class="preset" onclick="cargarKillersComunidad()">🌟 Killers Comunidad</button>
  <button class="preset" onclick="cargarTodos()">📋 Todos los Killers</button>
  <button class="preset" onclick="cargarPerks()">💎 Ventajas (Perks)</button>
  <button class="preset" onclick="cargarPartidas()">🎮 Partidas</button>
  <button class="preset" onclick="cargarNombres()">👤 Nombres</button>
  <button class="preset" onclick="cargarMapas()">👤 Mapas</button>
</div>

<h3>Items en la ruleta:</h3>
<div id="lista"></div>

<button class="spin" onclick="girar()">🎲 GIRAR RULETA</button>
<button class="clear" onclick="limpiar()">🗑 Limpiar todo</button>

const listaDiv = document.getElementById("lista");
const textoInput = document.getElementById("texto");
const excluir1Select = document.getElementById("excluir1");
const excluir2Select = document.getElementById("excluir2");

function guardarFirebase(){
  set(ref(db,"ruleta/premios"), premios);
}

function actualizarSelects(){
  // Actualizar ambos selects de exclusión
  [excluir1Select, excluir2Select].forEach(select => {
    select.innerHTML = '<option value="">-- Ninguno --</option>';
    premios.forEach((p, i) => {
      const option = document.createElement("option");
      option.value = i;
      option.textContent = p;
      select.appendChild(option);
    });
  });
}

function renderLista(){
  listaDiv.innerHTML="";
  premios.forEach((p,i)=>{
    const d=document.createElement("div");
    d.className="item";
    d.innerHTML = `
      <span>${p}</span>
      <button class="delete" onclick="eliminar(${i})">❌</button>
    `;
    listaDiv.appendChild(d);
  });
  actualizarSelects();
}

window.agregar = () => {
  const t = textoInput.value.trim();
  if(!t) return;
  premios.push(t);
  textoInput.value="";
  renderLista();
  guardarFirebase();
};

window.eliminar = (index) => {
  premios.splice(index,1);
  renderLista();
  guardarFirebase();
};

window.limpiar = () => {
  premios = [];
  renderLista();
  guardarFirebase();
};

window.girar = () => {
  if(premios.length === 0){
    alert("⚠️ Agrega items a la ruleta primero");
    return;
  }

  // Seleccionar ganador aleatorio
  const ganador = premios[Math.floor(Math.random() * premios.length)];

  // Escribir en Firebase
  set(ref(db,"ruleta"), {
    premios: premios,
    resultado: ganador
  });
};

window.girarConExclusiones = () => {
  if(premios.length === 0){
    alert("⚠️ Agrega items a la ruleta primero");
    return;
  }

  const excluido1 = excluir1Select.value;
  const excluido2 = excluir2Select.value;
  
  // Validar que no sean el mismo item
  if(excluido1 !== "" && excluido1 === excluido2){
    alert("⚠️ Los dos items excluidos no pueden ser el mismo");
    return;
  }

  // Crear array de índices válidos (sin los excluidos)
  const indicesValidos = [];
  premios.forEach((p, i) => {
    if(i.toString() !== excluido1 && i.toString() !== excluido2){
      indicesValidos.push(i);
    }
  });

  // Validar que queden al menos 1 item válido
  if(indicesValidos.length === 0){
    alert("⚠️ Debes dejar al menos un item sin excluir");
    return;
  }

  // Seleccionar ganador aleatorio de los items válidos
  const indiceGanador = indicesValidos[Math.floor(Math.random() * indicesValidos.length)];
  const ganador = premios[indiceGanador];

  // Escribir en Firebase
  set(ref(db,"ruleta"), {
    premios: premios,
    resultado: ganador
  });

  // Opcional: resetear los selects
  excluir1Select.value = "";
  excluir2Select.value = "";
};

window.cargarKillersOriginales = () => {
  premios = [...killersOriginales];
  renderLista();
  guardarFirebase();
};

window.cargarKillersLicenciados = () => {

window.cargarTodos = () => {
  premios = [...killersOriginales, ...killersLicenciados, ...killersComunidad];
  renderLista();
  guardarFirebase();
};

window.cargarPerks = () => {
  premios = [...perks];

  guardarFirebase();

window.cargarPartidas = () => {

window.cargarNombres = () => {

  renderLista();
  guardarFirebase();
};

window.cargarMapas = () => {
  premios = [...mapas];
  renderLista();
  guardarFirebase();
};

onValue(ref(db,"ruleta/premios"), snap=>{
  if(snap.exists()){
    premios = snap.val();
    renderLista();
  }
});
